<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울대학교 AI 활용 방침 조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --text-muted: #7c7c99;
    --tag-allow: #1a3a2a;
    --tag-allow-text: #4ade80;
    --tag-partial: #2a2a1a;
    --tag-partial-text: #fbbf24;
    --tag-deny: #3a1a1a;
    --tag-deny-text: #f87171;
    --tag-none: #1a1a2a;
    --tag-none-text: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffffff 0%, #a0a0cc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* Search box */
  .search-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .search-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }

  .search-input-wrap {
    position: relative;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    padding: 14px 14px 14px 44px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }

  input[type="text"]::placeholder {
    color: var(--text-muted);
  }

  /* Results list */
  .results-section {
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .results-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: 'Space Mono', monospace;
    padding: 0 4px;
  }

  .result-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 360px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .result-list::-webkit-scrollbar { width: 4px; }
  .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .result-item:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(2px);
  }

  .result-item .course-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .result-item .professor-name {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .result-item .arrow {
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .result-item:hover .arrow { opacity: 1; }

  /* Policy modal / card */
  .policy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: scaleIn 0.3s ease both;
  }

  .policy-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }

  .policy-card-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .policy-card-prof {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .back-btn:hover { border-color: var(--accent); color: var(--text); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .policy-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 16px;
  }

  .tag-allow { background: var(--tag-allow); color: var(--tag-allow-text); }
  .tag-partial { background: var(--tag-partial); color: var(--tag-partial-text); }
  .tag-deny { background: var(--tag-deny); color: var(--tag-deny-text); }
  .tag-none { background: var(--tag-none); color: var(--tag-none-text); }

  .policy-text {
    font-size: 14px;
    line-height: 1.85;
    color: #c8c8e0;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .no-policy {
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Initial state */
  .initial-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .initial-state .hint {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.6;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Glow accent top */
  .glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="header">
    <div class="badge">SNU · AI Policy</div>
    <h1>생성형 AI 활용 방침</h1>
    <p class="subtitle">수업명 또는 교수명을 검색하면 AI 사용 방침을 확인할 수 있습니다</p>
  </div>

  <div class="search-section">
    <div class="search-label">검색</div>
    <div class="search-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="예: 한국사, 조성엽..." autocomplete="off" />
    </div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="initial-state">
      <div>🔍 수업명이나 교수명을 입력해주세요</div>
      <div class="hint">총 1,398개 수업이 등록되어 있습니다</div>
    </div>
  </div>
</div>

urse": "처음 배우는 서양사", "professor": "김동혁", "ai_policy": "▪ 본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다. 그렇지만 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 가능하면 글쓰기에 AI를 사용하지 않을 것을 권장합니다.\n▪ 수업 중에는 AI의 사용을 엄격히 금합니다. 특히 수업 집중을 위해 교수자의 허락을 받지 않고 강의 내용을 녹취하는 것은 허용하지 않습니다."}, {"course": "처음 배우는 서양사", "professor": "홍지수", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행한다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않는다."}, {"course": "철학개론", "professor": "서영화", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "중국의 전통과 현대", "professor": "이용운", "ai_policy": "본 강의에서는 원칙적으로 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 학습에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만 과제를 AI에 맡기거나 불필요한 오해가 생기는 문제를 방지하기 위해, 수업의 평가는 기본적으로 시험 중심으로 하도록 하겠습니다.\n\n현실적으로 AI의 활용을 일방적으로 막는 것은 불가능에 가깝고, 저 또한 다양한 방면에서 AI를 이용하고 있습니다. 그렇기에 필요하다면 AI를 공부에 활용하되, 거기에 지나치게 의존하지 말고, AI의 답변을 비판적으로 검토하거나, 신뢰할 수 있는 정보를 스스로 찾는 연습을 게을리 하지 말도록 합시다."}, {"course": "철학으로 예술 보기", "professor": "신현주", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "철학개론", "professor": "이석재", "ai_policy": ""}, {"course": "철학개론", "professor": "백채영", "ai_policy": "본 강의에서는 수강생의 독창적인 문제 해결 능력과 비판적 사고 함양을 위하여 생성형 AI를 과제 및 여타 다른 수업 활동에 사용하지 않는다."}, {"course": "철학개론", "professor": "박지영", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "한국고대사의 쟁점", "professor": "최영은", "ai_policy": "본 강의는 수강생의 비판적 사고력과 독창적 문제 해결력 함양을 위하여 생성형 AI를 활용하지 않고 진행합니다. 특히 과제 수행에 있어 생성형 AI의 사용이 확인되는 경우 감점될 수 있습니다."}, {"course": "테마 중국사", "professor": "이정범", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비  tool in this course. Students may use generative AI to explore ideas or topics needed to complete assignments and to analyze data. However, if generative AI is used to complete an assignment, the name of the tool used, the process of its use, and the generated content must be clearly stated in the assignment. (The code of conduct for using AI tools will be determined and finalized during our first class session.)"}, {"course": "한국사", "professor": "김민주", "ai_policy": "● 본 강의에서는. 과제 수행에 필요한 아이디어 및 주제 탐색의 목적으로만 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다. 또한 과제 수행 시 필요한 자료는 출처가 명확해야 합니다.해당 규정을 준수하지 않을 경우 성적 상 불이익을 받을 수 있습니다."}, {"course": "한국의 문화유산", "professor": "정다혜", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다.\n과제 수행에 필요한 아이디어 및 주제 탐색, 자료분석 등의 목적으로 생성형 AI를 사용할 수 있습니다.\n다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다.\n구체적인 명시 방법은 강의 중 설명할 예정."}, {"course": "한국사", "professor": "김원혁", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "한국사", "professor": "손영득", "ai_policy": "▪ 본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명을 과제에 명시해야 합니다.\n※ 수업별로 교수자의 판단에 따라 서로 다른 방침을 시행할 수 있으며 수업에서 안내한 기준 준수."}, {"course": "현대사회와 윤리", "professor": "서원주", "ai_policy": ""}, {"course": "한국현대사의 이해", "professor": "지글러 카트야", "ai_policy": "▪ 본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다.\n\n※ 수업별로 교수자의 판단에 따라 서로 다른 방침을 시행할 수 있으며 수업에서 안내한 기준 준수."}, {"course": "한국현대사의 이해", "professor": "신유진", "ai_policy": "▪ 본 수업에서는 생성형 AI 활용을 지양합니다. 과제에서는 수강생이 독창성과 자유로운 사고방식을 보여주길 기대합니다.\n\n※ 수업별로 교수자의 판단에 따라 서로 다른 방침을 시행할 수 있으며 수업에서 안내한 기준 준수."}, {"course": "한국현대사의 이해", "professor": "윤성민", "ai_policy": "▪ 본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생 다."}, {"course": "컴퓨터과학이 여는 세계", "professor": "이광근", "ai_policy": ""}, {"course": "지능의 이해", "professor": "이인아", "ai_policy": "본 강의에서는 생성형 AI를 지식의 지평을 넓히고 학습 효율을 극대화하는 유용한 연구 파트너로 활용하는 것을 적극 권장합니다. 다만, 이는 어디까지나 학생 본인의 비판적 사고와 고유한 문제 해결 능력을 확장하는 수단으로 기능해야 합니다. 학생들은 자료 탐색, 아이디어 발상, 개념의 구조화 단계에서 AI를 자유롭게 활용할 수 있으나, AI가 생성한 텍스트나 아이디어를 맹목적으로 수용하거나 검증 과정 없이 그대로 결과물로 제출하는 것은 엄격히 제한합니다. 모든 AI 산출물은 반드시 학습자 자신의 논리와 언어로 재해석 및 재구성되는 과정을 거쳐야 하며, 도출된 정보의 사실 여부를 교차 검증하고 활용 범위를 투명하게 밝힘으로써, AI가 사고를 대체하는 것이 아니라 사고를 자극하고 정교화하는 촉매제가 되도록 책임감 있게 활용해야 합니다. 만약 학생의 AI 활용도가 여기에 밝힌 가이드라인을 위배한 맹목적 AI 활용에 해당된다는 것이 의심될 경우 담당교수는 해당 학생과의 면담을 포함한 1:1 상호작용을 통해 이를 확인할 권리를 가지며 그 결과 학생의 해당 내용에 대한 이해도에 심각한 문제가 발견될 경우, 가이드라인이 지켜지지 않았다고 간주할 것이고 해당 학생은 성적에 불이익을 감수해야 합니다."}, {"course": "성서와 기독교 사상의 이해", "professor": "김진숙", "ai_policy": "본 강의에서는 생성형 AI의 활용이 가능합니다. 수강생은 수업의 목적과 학습 성과를 저해하지 않는 범위 내에서, 학습의 보조로서 생성형 AI를 사용할 수 있습니다."}, {"course": "사진 속 지리여행", "professor": "박향기", "ai_policy": "- 평소 수업시간 소개되는 해외 연구를 번역 또는 해석하기 위한 AI활용, 수업시간 모둠학습 때 부여되는 미션을 빠른 시간 이해하기 위한 생성형 AI 활용이 가능합니다. 그러나 기말고사는 자신만의 일상적 예시 분석, 자신의 비판적 사고를 요하기 때문에 생성형 AI가 자신의 비판적 사고를 방해하지 않도록 종이 프린트물만 활용한 지필고사를 볼 예정입니다."}, {"course": "서양음악의 이해", "professor": "정주은", "ai_policy": "본 강의에서는 학습의 보조 도구로 생성형 AI를 사용할 수 있습니다.\n과제 수행에 필요한 자료 수집, 아이디어 탐색 등의 목적으로 활용가능하지만, 생성형 AI를 사용한 경우, 사용 도구명, 사용 과정, 사용 내용 등을 과제에 정확히 명시해야 하며, 생성형 AI가 과제 및 학습 수행에 주체적인 도구가 되어서는 안 됩니다."}, {"course": "사회주의의 역사", "professor": "노경덕", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "서양미술의 이해", "professor": "이은주", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "생활원예", "professor": "전창후", "ai_policy": "적극적인 활용을 권장함."}, {"course": "시장경제와 법", "professor": "정주미", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "산과 인생", "professor": "박승일", "ai_policy": "본 강의의 모든 수업 활동은 생성형  생성형 AI를 사용할 수 있습니다."}, {"course": "현대도시건축산책", "professor": "한상우", "ai_policy": "▪본 강의에서는 생성형 AI의 활용이 가능합니다. 수강생은 수업의 목적과 학습 성과를 저해하지 않는 범위 내에서, 모든 수업 활동에 생성형 AI를 사용할 수 있습니다.\n▪가상보다 실제를 직접 마주하고 긍정하는 본 수업의 핵심 가치에 따라, 모든 ’산책‘, ‘관찰’, ‘기록’ 활동은 반드시 수강생 개인의 실제 현장 경험과 신체적 감각을 바탕으로 진행되어야 합니다.\n▪현장을 직접 걷지 않고 생성형 AI가 만든 가상의 묘사나 이미지를 자신의 실제 경험인 것처럼 대체하여 제출하는 행위는 본 수업의 학습 목적에 위배되는 것으로 간주합니다."}, {"course": "현대음악의 이해", "professor": "이민희", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "현대문화와 기독교", "professor": "이유나", "ai_policy": "본 강의에서는 생성형 AI의 활용이 가능합니다. 수강생은 수업의 목적과 학습 성과를 저해하지 않는 범위 내에서, 모든 수업 활동에 생성형 AI를 사용할 수 있습니다."}, {"course": "숲의 이해", "professor": "박일권", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "슬라브 전설과 유산", "professor": "황기은", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 특히 수업 시간 내, 강의실에서 모든 AI도구를 사용하는 것을 금지합니다."}, {"course": "세계음악", "professor": "Anna Yates-Lu", "ai_policy": "Generative AI may be used as a supplementary learning tool in this course. Students may use generative AI to provide a starting point in constructing their assignment, or as a translation tool. However, if generative AI is used in an assignment, the name of the tool used, the process of its use, and the generated content must be clearly stated in the assignment. Furthermore, there needs to be clear demonstration of work done beyond that provided by generative AI for the work to be acknowledged as the student's work."}, {"course": "생활구강건강관리", "professor": "한동헌", "ai_policy": "본 강의에서는 생성형 AI의 활용이 가능합니다. 수강생은 수업의 목적과 학습 성과를 저해하지 않는 범위 내에서, 모든 수업 활동 중 생성형 AI를 사용할 수 있습니다."}, {"course": "현대 동아시아 문화와 한문 서사의 재발견", "professor": "김진수", "ai_policy": "The use of AI is allowed in this course as a limited, suppleme  활용하지 않고 진행합니다.\n수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "손제연", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다. 따라서 자동화된 알고리즘에 의한 산출물은 교수자와 상의 없이 과제에 포함할 수 없으며, 이를 과제에 포함하는 경우에는 표절로 간주될 수 있습니다.\n\n※ 수업별로 교수자의 판단에 따라 서로 다른 방침을 시행할 수 있으며 수업에서 안내한 기준 준수"}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "조수남", "ai_policy": "[통합 강의 안내] 본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다.\n\n※ 인문글 011반 수업의 생성형 AI 도구 활용 가이드라인\n\n1. 사실 및 출처 확인과 검토\n본 수업에서는 주제를 찾거나 공부하는 데 AI를 보조적으로 활용하는 것은 허용합니다. 다만, 생성형 AI는 부정확하거나 사실과 다르거나 참고문헌과 일치하지 않는 결과를 보고할 수 있습니다. 따라서 그 결과물을 보조적으로 활용할 경우, 반드시 해당 참고문헌을 확인해 사실 여부 및 정확한 출처 확인 등을 점검해야 합니다.\n\n2. 책임 소재의 인지\n본 수업에서는 1, 2주 차에 글쓰기 및 연구 윤리에 관해 자세히 안내합니다. eTL에 제출하는 수업 과제는 AI로 생성한 텍스트를 활용하지 않고 글쓰기 및 연구 윤리에 부합하도록 작성합니다.\n\n3. 투명한 활용 공개 및 명시\n서울대 eTL에는 카피 킬러와 GPT 킬러가 탑재되어 있습니다. 불필요한 오해를 방지하기 위해 과제 작성 과정에서 AI를 활용한 경우, AI 활용 사실 및 방식에 관해 적절하게 보고해 주실 것을 제안합니다."}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "이현우", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다.\n수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "이상원", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "이상원", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "홍은영", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Paul Shepherd", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Christiaan Prinsloo", "ai_policy": ""}, {"course": "대학영어 1", "professor": "박민영", "ai_policy": "In general, all class activities during this lecture must be conducted without the use of generative AI. This policy is intended to ensure that students develop and demonstrate their own creative problem-solving skills and critical thinking abilities, without reliance on generative AI tools. However, the instructor may provide instructions which will enable you to use AI for certain tasks. If generative AI is used to complete an assignment, the name of the tool used, the process of its use, and the generated content must be clearly stated in the assignment."}, {"course": "대학영어 1", "professor": "Philip Park", "ai_policy": "Generative AI may be used as a supplementary learning tool in this course in cases specified by the instructor. Students, for example, may use generative AI to explore ideas or topics needed to complete assignments and to analyze data. However, if generative AI is used to complete an assignment, the name of the tool used, the process of its use, and the generated content must be clearly stated in the assignment."}, {"course": "대학영어 1", "professor": "송미정", "ai_policy": ""}, {"course": "대학영어 1", "professor": "조경진", "ai_policy": "Generative AI can be a useful learning tool, but it should be used carefully and responsibly in this course. Language learning requires trial and error, making mistakes, and actively working through those mistakes. This process is essential for developing genuine language proficiency. You may use generative AI in limited and appropriate ways, such as:\n\n• brainstorming ideas for writing or presentations\n• checking the meaning and usage of words or expressions\n• polishing grammar, clarity, or organization after you have written your own draft.\n\nHowever, you may not use generative AI to write an assignment for you in whole or in large part. Submitting work that is entirely or primarily generated by AI is not permitted in this course. All submitted assignments should reflect your own thinking, language use, and effort.\nIf you are unsure whether a particular use of generative AI is appropriate, please ask the instructor before submitting your work."}, {"course": "대학 글쓰기 2: 인문학글쓰기", "professor": "이유선", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Luke Peter Wall", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학영어 1", "professor": "임현량", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Christiaan Prinsloo", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Christopher Hemann", "ai_policy": "The misuse of AI is the same as plagiarism. You may not use generative AI to create content or to complete tasks that you do not have the knowledge and skills to complete yourself. This includes the overuse of translation programs.\n\nWriting assignments (including presentations) will require revision portfolios that demonstrate that the student did the work themselves. Without proof of this effort, assignments will get major penalties.\n\nWe will discuss the proper use of AI more as we discuss the major assignments."}, {"course": "대학영어 1", "professor": "유은정", "ai_policy": "강의계획서 참조"}, {"course": "대학영어 1", "professor": "Andrew Mahaffey Wilbur", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Philip Park", "ai_policy": "Generative AI may be used as a supplementary learning tool in this course in cases specified by the instructor. Students, for example, may use generative AI to explore ideas or topics needed to complete assignments and to analyze data. However, if generative AI is used to complete an assignment, the name of the tool used, the process of its use, and the generated content must be clearly stated in the assignment."}, {"course": "대학영어 1", "professor": "Kara June Ritchhart", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학영어 1", "professor": "손현주", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Luke Peter Wall", "ai_policy": "본 강의의 모든 수업 활동은 생성형 AI를 활용하지 않고 진행합니다. 수강생의 독창적인 문제 해결력과 비판적 사고력 함양을 위하여 생성형 AI를 사용하지 않습니다."}, {"course": "대학영어 1", "professor": "송미경", "ai_policy": ""}, {"course": "대학영어 1", "professor": "Christo ourse. All submitted assignments should reflect your own thinking, language use, and effort.\nIf you are unsure whether a particular use of generative AI is appropriate, please ask the instructor before submitting your work."}, {"course": "대학영어 1", "professor": "Paul Shepherd", "ai_policy": ""}, {"course": "대학영어 1", "professor": "플레즈니악 다니엘 호억버그", "ai_policy": ""}, {"course": "대학영어 1", "professor": "이영화", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "대학영어 1", "professor": "Philip Park", "ai_policy": "Generative AI may be used as a supplementary learning tool in this course in cases specified by the instructor. Students, for example, may use generative AI to explore ideas or topics needed to complete assignments and to analyze data. However, if generative AI is used to complete an assignment, the name of the tool used, the process of its use, and the generated content must be clearly stated in the assignment."}, {"course": "대학영어 1", "professor": "김예리", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 강의자가 허용하는 과제에 한하여 수행에 필요한 아이디어 및 주제 탐색, 오류 수정 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다. 또한, 강의자가 명시적으로 허용하지 않은 과제와 활동에서 사용하면 해당 과제 혹은 활동에 대하여 F를 받게 됩니다."}, {"course": "대학영어 1", "professor": "김진", "ai_policy": "본 강의에서는 교수자가 지정한 과제 수행에 한해 생성형 AI를 활용할 수 있으며, 수업에서 제공된 안내문의 방법에 따라 사용해야 합니다. 생성형 AI를 사용한 과제에 대해서는 사용 도구명과 사용 방법을 포함한 보고서를 제출해야 합니다."}, {"course": "대학영어 1", "professor": "허우리", "ai_policy": ""}, {"course": "대학영어 1", "professor": "오한솔", "ai_policy": "이 수업에서는 온라인 번역 도구(예: Google Translate)와 생성형 AI 도구(예: ChatGPT)를 쓰기 과제에 사용하는 것을 강력히 권장하지 않습니다. 단어 또는 짧은 구문을 이해하기 위한 제한적인 사용은 허용될 수 있습니다. 이러한 목적의 경우, 교수자는 특정 과제에 한해 AI 사용을 허용하는 구체적인 지침을 제공합니다. 이 경우 반드시 교수자의 지시를 따라야 합니다.\n\n그러나 문단이나 글 전체를 작성하는 데 이러한 도구에 과도하게 의존하는 것은, 영어로 사고하고 글을 쓰는 능력을 약화시키며, 학습자의 학습과 성장에 부정적인 영향을 줄 수 있습니다. 가장 중 utput will be considered evidence of non-engagement and lack of authorship responsibility.\n\nSuch submissions may receive:\n• U (Unsatisfactory) for PBL modules or reports\n• F for major assignments or final submissions\n\nThis applies even if AI use is disclosed.\n\nDisclosure does not excuse negligence. Using AI without verification is treated analogously to submitting data from a broken instrument without checking calibration.\n\nStudents remain fully responsible for:\n• Verifying all claims, calculations, figures, and references\n• Understanding and being able to explain every element of their submission\n• Ensuring that AI assistance does not replace independent reasoning\n\nThis policy follows the Seoul National University AI Guidelines (2026) while adopting stricter standards appropriate to a course centered on measurement, comparison, and responsibility."}, {"course": "베리타스 실천: 디자인적 사고의 확장적 실천", "professor": "정의철", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "베리타스 실천: 현대사회와 적정기술", "professor": "박형동", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료 분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "베리타스 실천: 음식과 회복 프로젝트", "professor": "이정은", "ai_policy": ""}, {"course": "베리타스 실천: 인간인지와 인공지능", "professor": "이성은", "ai_policy": "본 강의에서는 생성형 AI를 학습 보조 도구로 활용할 수 있습니다. 과제 수행에 필요한 아이디어 및 주제 탐색, 자료분석 등의 목적으로 생성형 AI를 사용할 수 있습니다. 다만, 생성형 AI를 과제 수행에 사용한 경우, 사용 도구명, 사용 과정 및 생성 내용 등을 과제에 명시해야 합니다."}, {"course": "베리타스 실천: 스마트 도시와 플레이스 메이킹", "professor": "김세훈", "ai_policy": "본 강의에서는 생성형 AI의 활용이 가능합니다. 수강생은 수업의 목적과 학습 성과를 저해하지 않는 범위 내에서, 모든 수업 활동 중 생성형 AI를 사용할 수 있습니다. 단, 프로젝트 결과물의 최종 책임자(Editor-in-Chief)는 수강생 본인임을 명심해야 합니다. 따라서 AI가 생성한 텍스트, 이미지, 도표 등의 논리적 비약이나 표현의 어색함, 오류 등을 비판적으로 검수하고 보완하여 완성도를 높이는 것은 수강생의 몫입니다."}, {"course": "베리타스 실천: 인공지 const searchInput = document.getElementById('searchInput');
const resultsSection = document.getElementById('resultsSection');

let currentView = 'search'; // 'search' | 'policy'

function categorize(policy) {
  if (!policy) return 'none';
  if (/금지|사용하지 않|엄격히 금|활용하지 않|금함/.test(policy)) return 'deny';
  if (/가능|허용|활용할 수 있|사용할 수 있|권장/.test(policy)) {
    if (/금지|금함|지양|않습니다/.test(policy)) return 'partial';
    return 'allow';
  }
  if (/지양|제한|않/.test(policy)) return 'deny';
  return 'partial';
}

function tagHTML(policy) {
  const cat = categorize(policy);
  const labels = {
    allow: '✓ 활용 가능',
    partial: '△ 조건부 허용',
    deny: '✕ 활용 금지',
    none: '— 방침 없음'
  };
  const classes = { allow: 'tag-allow', partial: 'tag-partial', deny: 'tag-deny', none: 'tag-none' };
  return `<span class="policy-tag ${classes[cat]}">${labels[cat]}</span>`;
}

function showResults(query) {
  if (!query) {
    resultsSection.innerHTML = `<div class="initial-state">
      <div>🔍 수업명이나 교수명을 입력해주세요</div>
      <div class="hint">총 ${DATA.length.toLocaleString()}개 수업이 등록되어 있습니다</div>
    </div>`;
    return;
  }

  const q = query.trim();
  const matches = DATA.filter(d =>
    d.course.includes(q) || d.professor.includes(q)
  ).slice(0, 50);

  if (matches.length === 0) {
    resultsSection.innerHTML = `<div class="empty-state">검색 결과가 없습니다 🤔</div>`;
    return;
  }

  resultsSection.innerHTML = `
    <div class="results-label">${matches.length}개 수업 검색됨</div>
    <div class="result-list" id="resultList"></div>
  `;

  const list = document.getElementById('resultList');
  matches.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'result-item';
    el.innerHTML = `
      <div class="course-name">${item.course}</div>
      <div class="professor-name">${item.professor} 교수</div>
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    `;
    el.addEventListener('click', () => showPolicy(item));
    list.appendChild(el);
  });
}

function showPolicy(item) {
  const policyHTML = item.ai_policy
    ? `${tagHTML(item.ai_policy)}<p class="policy-text">${escapeHTML(item.ai_policy)}</p>`
    : `${tagHTML('')}<p class="no-policy">등록된 AI 활용 방침이 없습니다.</p>`;

  resultsSection.innerHTML = `
    <div class="policy-card">
      <div class="policy-card-header">
        <div>
          <div class="policy-card-title">${item.course}</div>
          <div class="policy-card-prof">${item.professor} 교수</div>
        </div>
        <button class="back-btn" onclick="goBack()">← 목록으로</button>
      </div>
      <div class="divider"></div>
      ${policyHTML}
    </div>
  `;
}

function goBack() {
  showResults(searchInput.value);
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

searchInput.addEventListener('input', (e) => {
  showResults(e.target.value);
});

// Focus on load
window.addEventListener('load', () => searchInput.focus());
</script>
